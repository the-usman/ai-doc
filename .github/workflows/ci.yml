name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python lint dependencies
        run: pip install ruff
        working-directory: backend

      - name: Run ruff
        run: ruff check .
        working-directory: backend

      - name: Run ruff format check
        run: ruff format --check .
        working-directory: backend

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Run ESLint
        run: npm run lint
        working-directory: frontend

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: ai_doc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ai_doc_test
      DB_USER: test_user
      DB_PASSWORD: test_password
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/ai_doc_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      APP_ENV: test
      APP_SECRET: ci-test-secret-minimum-32-characters-long
      GOOGLE_CLIENT_ID: test-id
      GOOGLE_CLIENT_SECRET: test-secret
      GOOGLE_REDIRECT_URI: http://testserver/api/auth/callback/google
      GITHUB_CLIENT_ID: test-github-id
      GITHUB_CLIENT_SECRET: test-github-secret
      GITHUB_REDIRECT_URI: http://testserver/api/auth/callback/github
      FRONTEND_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Apply database schema
        run: |
          PGPASSWORD=test_password psql \
            -h localhost -p 5432 \
            -U test_user -d ai_doc_test \
            -f schema/schema.sql

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements-dev.txt
        working-directory: backend

      - name: Run pytest
        run: pytest --tb=short
        working-directory: backend

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Run frontend tests
        run: npm test
        working-directory: frontend

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build -t ai-doc:ci .

  schema:
    name: Validate SQL schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install sqlfluff
      - run: sqlfluff lint schema/schema.sql --dialect postgres
