# DevAI-Doc — CI/CD Pipeline
#
# This workflow runs on every push to any branch and on every pull request
# targeting main. It is the quality gate that ensures no broken code reaches
# the main branch.
#
# A pull request cannot be merged unless this pipeline passes.
# This is enforced by the branch protection rule on main — not by convention.
#
# Pipeline stages (run in sequence, fail fast):
#   1. Lint    — static analysis, catches style and obvious errors
#   2. Test    — unit and integration tests against a real database
#   3. Build   — confirms the Docker image can be built successfully
#   4. Schema  — validates schema.sql syntax against the postgres dialect
#
# The eval harness (Phase 5) is a separate on-demand workflow.
# It is not run here because each eval invocation makes real LLM API calls,
# which adds cost and latency inappropriate for every push.

name: CI

on:
  push:
    branches:
      - "**"                           # every branch, every push
  pull_request:
    branches:
      - main                           # PRs targeting main

jobs:

  # ---------------------------------------------------------------------------
  # Job 1 — Lint
  # ---------------------------------------------------------------------------
  # Catches style issues, unused imports, type errors, and common mistakes
  # before the tests run. Failing fast on lint is cheaper than failing slow
  # on tests that could have been avoided.
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # --- Python projects: uncomment this block, delete the Node block ---
      # - name: Set up Python
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: "3.12"
      #
      # - name: Install dependencies
      #   run: pip install -r requirements-dev.txt
      #
      # - name: Run ruff linter
      #   run: ruff check .
      #
      # - name: Run ruff formatter check
      #   run: ruff format --check .

      # --- Node/TypeScript projects: uncomment this block, delete the Python block ---
      # - name: Set up Node
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: "20"
      #     cache: "npm"
      #
      # - name: Install dependencies
      #   run: npm ci
      #
      # - name: Run ESLint
      #   run: npm run lint
      #
      # - name: Run Prettier check
      #   run: npm run format:check

  # ---------------------------------------------------------------------------
  # Job 2 — Test
  # ---------------------------------------------------------------------------
  # Runs the full test suite against a real PostgreSQL database spun up as a
  # service container. Tests run against the same database engine used in
  # production — not SQLite, not mocks, a real Postgres instance.
  #
  # Using pgvector/pgvector:pg16 so vector extension tests work in CI
  # with the same image used locally and in production.
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint                        # only run if lint passes

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: ai_doc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Test environment variables — real values, but for the CI database only.
      # Never put production secrets in CI environment variables without using
      # GitHub Secrets (secrets.YOUR_SECRET_NAME syntax).
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ai_doc_test
      DB_USER: test_user
      DB_PASSWORD: test_password
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      APP_ENV: test

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Apply database schema
        run: |
          PGPASSWORD=test_password psql \
            -h localhost -p 5432 \
            -U test_user -d ai_doc_test \
            -f schema/schema.sql

      # --- Python projects ---
      # - name: Set up Python
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: "3.12"
      #
      # - name: Install dependencies
      #   run: pip install -r requirements-dev.txt
      #
      # - name: Run tests
      #   run: pytest --tb=short

      # --- Node/TypeScript projects ---
      # - name: Set up Node
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: "20"
      #     cache: "npm"
      #
      # - name: Install dependencies
      #   run: npm ci
      #
      # - name: Run tests
      #   run: npm test

  # ---------------------------------------------------------------------------
  # Job 3 — Build
  # ---------------------------------------------------------------------------
  # Confirms the Docker image builds successfully. A build that passes locally
  # but fails in CI usually means a missing file in .dockerignore, a hardcoded
  # local path, or a dependency that was installed globally on the developer's
  # machine but not declared in the project.
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test                        # only build if tests pass

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-doc:ci .

  # ---------------------------------------------------------------------------
  # Job 4 — Schema validation
  # ---------------------------------------------------------------------------
  # Lints schema/schema.sql using sqlfluff against the postgres dialect.
  # Catches syntax errors, inconsistent style, and reserved word misuse before
  # they reach the database. Runs in parallel with the other jobs because it
  # has no dependencies.
  schema:
    name: Validate SQL schema
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python for sqlfluff
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Lint schema.sql
        run: sqlfluff lint schema/schema.sql --dialect postgres
