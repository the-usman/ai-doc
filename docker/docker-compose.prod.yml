# DevAI-Doc — Production Stack
#
# Used by Dokploy to run the application in production.
# This file is deliberately different from docker-compose.yml.
# Read the differences and understand each one before deploying.
#
# Key differences from the development compose file:
#   - Database port is NOT exposed to the internet
#   - Source code is NOT mounted as a volume — the image is the artefact
#   - No debug flags or hot-reload commands
#   - Redis port is NOT exposed — only accessible within the Docker network
#   - Restart policies are set so services recover from crashes automatically
#
# Environment variables are set in the Dokploy secrets panel.
# Never put real values in this file. Never commit secrets to the repository.

services:

  app:
    image: ${REGISTRY_IMAGE}:${IMAGE_TAG:-latest}   # built image, not source mount
    restart: unless-stopped
    ports:
      - "3000:3000"                                 # only the app port is exposed; adjust as needed
    env_file:
      - .env                                        # Dokploy injects this from the secrets panel
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    # No ports section here — the database is NOT exposed to the internet.
    # The app container reaches it via the service name "db" on the internal network.
    # Exposing the database port in production is a critical security mistake.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No ports section — Redis is not exposed to the internet in production.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
