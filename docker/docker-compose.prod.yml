# AI-Doc — Production stack (Dokploy)
#
# Domains tab (then click Redeploy — required):
#   Service Name: app
#   Host: aidoc.usman.talent.techsupersonic.com
#   Container Port: 3000
#   HTTPS: ON (Let's Encrypt) — required if you open https:// in the browser
#
# Use "Preview Compose" in Dokploy to confirm Traefik labels were injected.

name: ai-doc-prod

services:
  app:
    image: ${REGISTRY_IMAGE:-ai-doc}:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    # Dokploy convention: publish container port only (no host 3000 bind)
    ports:
      - "3000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_PORT: "3000"
      DB_HOST: db
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-doc
      - dokploy-network
    labels:
      - traefik.docker.network=dokploy-network
      - traefik.enable=true
      - traefik.http.services.aidoc.loadbalancer.server.port=3000
      # HTTPS router (fixes https 404 when Dokploy only created the http router)
      - traefik.http.routers.aidoc-https.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.aidoc-https.entrypoints=websecure
      - traefik.http.routers.aidoc-https.tls=true
      - traefik.http.routers.aidoc-https.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.aidoc-https.service=aidoc

  mcp:
    image: ${REGISTRY_IMAGE:-ai-doc}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command:
      ["uvicorn", "app.mcp_server:app", "--host", "0.0.0.0", "--port", "8001"]
    env_file:
      - .env
    environment:
      APP_ENV: production
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8001/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-doc

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../schema/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai-doc

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ai-doc

networks:
  ai-doc:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  postgres_data:
