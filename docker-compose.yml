# AI-Doc — Local development stack
# Start: docker compose up --build
# Stop:  docker compose down
# Reset DB: docker compose down -v

name: ai-doc-dev

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      APP_ENV: development
      DB_HOST: db
      REDIS_HOST: redis
      FRONTEND_URL: http://localhost:3000
      API_URL: http://localhost:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-doc

  mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile.api.dev
    command:
      ["uvicorn", "app.mcp_server:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      APP_ENV: development
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-doc

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_PROXY: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ai-doc

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    environment:
      POSTGRES_USER: ${DB_USER:-ai-doc_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-ai-doc}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-ai-doc_user} -d ${DB_NAME:-ai-doc}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-doc

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ai-doc

networks:
  ai-doc:
    driver: bridge

volumes:
  postgres_data:
